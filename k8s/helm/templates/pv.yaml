apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
spec:
  capacity:
    storage: {{ .Values.database.storage.size }}
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.database.storage.class }}
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: {{ .Values.database.storage.hostPath }}
