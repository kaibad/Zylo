# Zylo - DevSecOps CI/CD Pipeline

name: Zylo DevSecOps Pipeline

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main", "feature"]

# Avoid duplicate/overlapping runs for the same ref
concurrency:
  group: zylo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Security: restrict default permissions to read-only
permissions:
  contents: read

env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/kaibad/zylo/zylo-backend
  FRONTEND_IMAGE: ghcr.io/kaibad/zylo/zylo-frontend

jobs:
  # STAGE 1: Linting
  lint:
    name: "Lint Code"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ matrix.component }}
        run: npm run lint

  # STAGE 1.5: Secret Scanning (Gitleaks)
  secret-scan:
    name: "Secret Scan"
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # STAGE 1.8: IaC Security Scan (Checkov) Terraform + K8s
  # Blocking for Terraform; soft fail for K8s manifests
  iac-scan:
    name: "IaC Security Scan"
    runs-on: ubuntu-latest
    needs: [lint, secret-scan]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          config_file: .checkov.yml

      - name: Run Checkov on Kubernetes manifests
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: true
          output_format: cli

  # STAGE 2: Software Composition Analysis (SCA) — Dependency Audit
  sca:
    name: "Dependency Audit"
    runs-on: ubuntu-latest
    needs: [lint, secret-scan, iac-scan]
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: npm audit
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ matrix.component }}
          path: ${{ matrix.component }}/audit-report.json
          retention-days: 14

  # STAGE 3: Dockerfile Lint (Hadolint)
  dockerfile-lint:
    name: "Dockerfile Lint"
    runs-on: ubuntu-latest
    needs: [lint, secret-scan, iac-scan]
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.component }}/Dockerfile
          failure-threshold: warning

  # STAGE 5: Build & Push Container Images
  build:
    name: "Build ${{ matrix.component }}"
    runs-on: ubuntu-latest
    needs: [sca, dockerfile-lint]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component: [backend, frontend]
    outputs:
      backend-digest: ${{ steps.digest-export.outputs.backend }}
      frontend-digest: ${{ steps.digest-export.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.component == 'backend' && env.BACKEND_IMAGE || env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          no-cache: true

      - name: Export digest
        id: digest-export
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ matrix.component }}=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  # STAGE 6: Cosign Keyless Image Signing
  sign:
    name: "Sign ${{ matrix.component }} Image"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image by digest
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE: ${{ matrix.component == 'backend' && env.BACKEND_IMAGE || env.FRONTEND_IMAGE }}
          DIGEST: ${{ matrix.component == 'backend' && needs.build.outputs.backend-digest || needs.build.outputs.frontend-digest }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

  # STAGE 7: Container Image Scanning (Trivy)
  image-scan:
    name: "Scan ${{ matrix.component }} Image"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        env:
          DIGEST: ${{ matrix.component == 'backend' && needs.build.outputs.backend-digest || needs.build.outputs.frontend-digest }}
        with:
          image-ref: "${{ matrix.component == 'backend' && env.BACKEND_IMAGE || env.FRONTEND_IMAGE }}@${{ env.DIGEST }}"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          timeout: "10m"

  update-manifest:
    name: "Update Helm Chart Values"
    runs-on: ubuntu-latest
    needs: [sign, image-scan]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout helm-charts repo
        uses: actions/checkout@v4
        with:
          repository: kaibad/helm-charts
          token: ${{ secrets.HELM_CHARTS_PAT }}
          path: helm-charts

      - name: Resolve image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tags in values.yaml
        working-directory: helm-charts/zylo
        run: |
          yq -i '.backend.tag = "${{ steps.vars.outputs.TAG }}"' values.yaml
          yq -i '.frontend.tag = "${{ steps.vars.outputs.TAG }}"' values.yaml

      - name: Commit and push
        working-directory: helm-charts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zylo/values.yaml
          if git diff --cached --quiet; then
            echo "No tag changes, skipping commit"
            exit 0
          fi
          git commit -m "chore(zylo): bump image tags to ${{ steps.vars.outputs.TAG }} [skip ci]"
          git push origin main
